# WHTC nginx config — thewitchinghourtone.club
# Add this as an include or merge into the droplet's main nginx config
# Assumes: WHTC app on 127.0.0.1:8090, SSL certs in /etc/nginx/ssl/whtc/

upstream whtc_backend {
    server 127.0.0.1:8090;
    keepalive 8;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name thewitchinghourtone.club www.thewitchinghourtone.club;
    return 301 https://thewitchinghourtone.club$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name thewitchinghourtone.club www.thewitchinghourtone.club;

    # SSL — update paths once certs are provisioned (Let's Encrypt / certbot)
    ssl_certificate /etc/nginx/ssl/whtc/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/whtc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:WHTC_SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Body size limit (for audio uploads)
    client_max_body_size 50M;

    # Rate limiting for login
    limit_req_zone $binary_remote_addr zone=whtc_login:10m rate=5r/m;

    # Honeypot paths — no rate limit, let them try
    location ~ ^/(wp-admin|wp-login\.php|wp-login|administrator|admin\.php|user/login|signin|dashboard) {
        proxy_pass http://whtc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin login endpoint with stricter rate limiting
    location /api/auth/login {
        limit_req zone=whtc_login burst=3 nodelay;
        proxy_pass http://whtc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://whtc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Music files — long cache, they don't change
    location /music/ {
        proxy_pass http://whtc_backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Static assets
    location /static/ {
        proxy_pass http://whtc_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else (player at /, admin at /breakdown)
    location / {
        proxy_pass http://whtc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
