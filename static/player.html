<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHTC BED</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<style>
  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .header { flex-shrink: 0; position: static; }

  /* Now Playing */
  .now-playing {
    padding: 14px 20px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
    min-height: 70px;
  }

  .now-playing .label {
    font-size: 9px;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .now-playing .track-name {
    font-family: 'Special Elite', cursive;
    font-size: 16px;
    color: #e8d5b5;
    line-height: 1.3;
  }

  /* Progress */
  .progress-wrap {
    padding: 8px 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: #1a1a1a;
    cursor: pointer;
    position: relative;
    border-radius: 2px;
  }

  .progress-fill {
    height: 100%;
    background: #c8b89a;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
  }

  .time {
    font-size: 10px;
    color: #555;
    font-variant-numeric: tabular-nums;
    min-width: 36px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 12px 20px 14px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .controls button {
    background: none;
    border: 1px solid #333;
    color: #c8b89a;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .controls button:hover {
    border-color: #c8b89a;
    background: #1a1a1a;
  }

  .controls button.play-btn {
    width: 52px;
    height: 52px;
    font-size: 20px;
    border-color: #c8b89a;
  }

  .controls button.active {
    background: #c8b89a;
    color: #0a0a0a;
    border-color: #c8b89a;
  }

  /* Track List */
  .tracklist-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .tracklist-wrap::-webkit-scrollbar { width: 4px; }
  .tracklist-wrap::-webkit-scrollbar-track { background: #0a0a0a; }
  .tracklist-wrap::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .track {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.1s;
    gap: 12px;
  }

  .track:hover { background: #111; }

  .track.active {
    background: #141210;
    border-left: 2px solid #c8b89a;
    padding-left: 18px;
  }

  .track .num {
    font-size: 10px;
    color: #333;
    min-width: 22px;
    text-align: right;
  }

  .track.active .num { color: #c8b89a; }

  .track .info {
    flex: 1;
    min-width: 0;
  }

  .track .title {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track.active .title { color: #e8d5b5; }

  .track .dur {
    font-size: 10px;
    color: #333;
    min-width: 36px;
    text-align: right;
  }

  .loading {
    padding: 40px 20px;
    text-align: center;
    color: #333;
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1><a href="/">WHTC</a></h1>
  <div class="sub">The Witching Hour Tone Club</div>
  <div class="spacer"></div>
  <span class="page-title"></span>
  <div class="spacer"></div>
  <a href="/about" class="nav-about">[About]</a>
  <a href="/api/tracks.csv" class="nav-download">[Download CSV]</a>
</div>

<div class="now-playing">
  <div class="label">Now Playing</div>
  <div class="track-name" id="nowPlaying">&mdash;</div>
</div>

<div class="progress-wrap">
  <span class="time" id="elapsed">0:00</span>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="time" id="remaining">0:00</span>
</div>

<div class="controls">
  <button id="shuffleBtn" title="Shuffle">&#10574;</button>
  <button id="prevBtn" title="Previous">&#9198;</button>
  <button class="play-btn" id="playBtn" title="Play">&#9654;</button>
  <button id="nextBtn" title="Next">&#9197;</button>
  <button id="loopBtn" title="Loop">&#10227;</button>
</div>

<div class="tracklist-wrap" id="tracklist">
  <div class="loading">Loading tracks...</div>
</div>

<div style="padding:8px 20px;flex-shrink:0;">
  <p style="font-size:9px;color:#444;line-height:1.6;letter-spacing:0.5px;">
    These recordings are in the public domain. Download and use them all you want, but please consider giving credit to WHTC for the mastering.
  </p>
</div>

<div class="footer" style="flex-shrink:0;padding:12px 20px;margin-top:0;">
  <a class="footer-link" href="https://www.youtube.com/channel/UCVP7UpPw6Rr_nJFBlFYDG7w" target="_blank">
    <img src="/static/whtc_rect.jpeg" alt="WHTC">
    <span>The Witching Hour Tone Club on YouTube</span>
  </a>
</div>

<script>
let tracks = [];
const audio = new Audio();
let currentIndex = 0;
let isPlaying = false;
let isShuffled = false;
let isLooping = false;
let playOrder = [];

const nowPlaying = document.getElementById('nowPlaying');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const loopBtn = document.getElementById('loopBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const elapsed = document.getElementById('elapsed');
const remaining = document.getElementById('remaining');
const tracklist = document.getElementById('tracklist');

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

async function loadTracks() {
  try {
    const resp = await fetch('/api/tracks');
    tracks = await resp.json();
    playOrder = tracks.map((_, i) => i);
    renderTracklist();
  } catch (e) {
    tracklist.innerHTML = '<div class="loading">Could not load tracks</div>';
  }
}

function renderTracklist() {
  tracklist.innerHTML = '';
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track' + (i === currentIndex ? ' active' : '');
    div.innerHTML = `
      <span class="num">${i + 1}</span>
      <div class="info"><div class="title">${t.title}</div></div>
      <span class="dur">${fmt(t.dur)}</span>
    `;
    div.onclick = () => { currentIndex = i; renderTracklist(); scrollToActive(); };
    div.ondblclick = () => { currentIndex = i; loadAndPlay(); };
    tracklist.appendChild(div);
  });
}

function scrollToActive() {
  const el = tracklist.querySelector('.track.active');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function loadAndPlay() {
  const t = tracks[currentIndex];
  audio.src = '/' + t.src;
  audio.play();
  isPlaying = true;
  playBtn.textContent = '\u23F8';
  nowPlaying.textContent = t.title;
  renderTracklist();
  scrollToActive();
}

function getNextIndex() {
  const pos = playOrder.indexOf(currentIndex);
  if (pos < playOrder.length - 1) return playOrder[pos + 1];
  if (isLooping) return playOrder[0];
  return -1;
}

function getPrevIndex() {
  const pos = playOrder.indexOf(currentIndex);
  if (pos > 0) return playOrder[pos - 1];
  if (isLooping) return playOrder[playOrder.length - 1];
  return -1;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

playBtn.onclick = () => {
  if (!audio.src || audio.src === location.href) { loadAndPlay(); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; playBtn.textContent = '\u25B6'; }
  else { audio.play(); isPlaying = true; playBtn.textContent = '\u23F8'; }
};

nextBtn.onclick = () => {
  const next = getNextIndex();
  if (next >= 0) { currentIndex = next; loadAndPlay(); }
};

prevBtn.onclick = () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const prev = getPrevIndex();
  if (prev >= 0) { currentIndex = prev; loadAndPlay(); }
};

shuffleBtn.onclick = () => {
  isShuffled = !isShuffled;
  shuffleBtn.classList.toggle('active', isShuffled);
  if (isShuffled) {
    playOrder = shuffle(tracks.map((_, i) => i));
    const pos = playOrder.indexOf(currentIndex);
    if (pos > 0) { playOrder.splice(pos, 1); playOrder.unshift(currentIndex); }
  } else {
    playOrder = tracks.map((_, i) => i);
  }
};

loopBtn.onclick = () => {
  isLooping = !isLooping;
  loopBtn.classList.toggle('active', isLooping);
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    elapsed.textContent = fmt(audio.currentTime);
    remaining.textContent = '-' + fmt(audio.duration - audio.currentTime);
  }
};

audio.onended = () => {
  const next = getNextIndex();
  if (next >= 0) { currentIndex = next; loadAndPlay(); }
  else { isPlaying = false; playBtn.textContent = '\u25B6'; }
};

progressBar.onclick = (e) => {
  if (audio.duration) {
    const rect = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  }
};

loadTracks();

// Record page hit
fetch('/api/hit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: '/'}) }).catch(() => {});

// Track YouTube clicks
document.querySelectorAll('a[href*="youtube.com"]').forEach(a => {
  a.addEventListener('click', () => {
    fetch('/api/hit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: '/youtube'}) }).catch(() => {});
  });
});
</script>
</body>
</html>
