<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHTC BED</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<style>
  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .header { flex-shrink: 0; position: static; }

  /* Now Playing */
  .now-playing {
    padding: 14px 20px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
    min-height: 70px;
  }

  .now-playing .label {
    font-size: 9px;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .now-playing .track-name {
    font-family: 'Special Elite', cursive;
    font-size: 16px;
    color: #e8d5b5;
    line-height: 1.3;
    overflow: hidden;
  }

  .now-playing .title-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .now-playing .title-text {
    flex-shrink: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .loading-anim {
    font-family: 'Special Elite', cursive;
    font-size: 12px;
    color: #555;
    letter-spacing: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: transform 0.35s ease-in, opacity 0.35s ease-in;
  }

  .loading-anim.scroll-off {
    transform: translateY(-30px);
    opacity: 0;
  }

  .now-playing .play-count {
    font-size: 9px;
    color: #444;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Progress */
  .progress-wrap {
    padding: 8px 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: #1a1a1a;
    cursor: pointer;
    position: relative;
    border-radius: 2px;
  }

  .progress-fill {
    height: 100%;
    background: #c8b89a;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
  }

  .time {
    font-size: 10px;
    color: #555;
    font-variant-numeric: tabular-nums;
    min-width: 36px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 12px 20px 14px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .controls button {
    background: none;
    border: 1px solid #333;
    color: #c8b89a;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .controls button svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .controls button:hover {
    border-color: #c8b89a;
    background: #1a1a1a;
  }

  .controls button.play-btn {
    width: 52px;
    height: 52px;
    border-color: #c8b89a;
  }

  .controls button.play-btn svg {
    width: 18px;
    height: 18px;
  }

  .controls button.active {
    background: #c8b89a;
    color: #0a0a0a;
    border-color: #c8b89a;
  }

  /* Track List */
  .tracklist-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .tracklist-wrap::-webkit-scrollbar { width: 4px; }
  .tracklist-wrap::-webkit-scrollbar-track { background: #0a0a0a; }
  .tracklist-wrap::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .track {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.1s;
    gap: 12px;
  }

  .track:hover { background: #111; }

  .track.active {
    background: #141210;
    border-left: 2px solid #c8b89a;
    padding-left: 18px;
  }

  .track .num {
    font-size: 10px;
    color: #333;
    min-width: 22px;
    text-align: right;
  }

  .track.active .num { color: #c8b89a; }

  .track .info {
    flex: 1;
    min-width: 0;
  }

  .track .title {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track.active .title { color: #e8d5b5; }

  .track .plays {
    font-size: 9px;
    color: #444;
    min-width: 28px;
    text-align: right;
  }

  .track .dur {
    font-size: 10px;
    color: #333;
    min-width: 36px;
    text-align: right;
  }

  .loading {
    padding: 40px 20px;
    text-align: center;
    color: #333;
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1><a href="/">WHTC</a></h1>
  <div class="sub">The Witching Hour Tone Club</div>
  <div class="spacer"></div>
  <span class="page-title"></span>
  <div class="spacer"></div>
  <a href="/about" class="nav-about">[About]</a>
  <a href="/api/tracks.csv" class="nav-download">[Download CSV]</a>
</div>

<div class="now-playing">
  <div class="label">Now Playing</div>
  <div class="track-name" id="nowPlaying">
    <div class="title-row">
      <span class="title-text" id="titleText">&mdash;</span>
      <span class="loading-anim" id="loadingText"></span>
    </div>
  </div>
  <div class="play-count" id="nowPlayCount"></div>
</div>

<div class="progress-wrap">
  <span class="time" id="elapsed">0:00</span>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="time" id="remaining">0:00</span>
</div>

<div class="controls">
  <button id="shuffleBtn" title="Shuffle"><svg viewBox="0 0 512 512"><path d="M403.8 34.4c12-5 25.7-2.2 34.9 6.9l64 64c6 6 9.4 14.1 9.4 22.6s-3.4 16.6-9.4 22.6l-64 64c-9.2 9.2-22.9 11.9-34.9 6.9s-19.8-16.6-19.8-29.6l0-32-32 0c-10.1 0-19.6 4.7-25.6 12.8L284 229.3 244 176l31.2-41.6C293.3 110.2 321.8 96 352 96l32 0 0-32c0-12.9 7.8-24.6 19.8-29.6zM164 282.7L204 336l-31.2 41.6C154.7 401.8 126.2 416 96 416l-64 0c-17.7 0-32-14.3-32-32s14.3-32 32-32l64 0c10.1 0 19.6-4.7 25.6-12.8L164 282.7zm274.6 188c-9.2 9.2-22.9 11.9-34.9 6.9s-19.8-16.6-19.8-29.6l0-32-32 0c-30.2 0-58.7-14.2-76.8-38.4L121.6 172.8c-6-8.1-15.5-12.8-25.6-12.8l-64 0c-17.7 0-32-14.3-32-32s14.3-32 32-32l64 0c30.2 0 58.7 14.2 76.8 38.4L326.4 339.2c6 8.1 15.5 12.8 25.6 12.8l32 0 0-32c0-12.9 7.8-24.6 19.8-29.6s25.7-2.2 34.9 6.9l64 64c6 6 9.4 14.1 9.4 22.6s-3.4 16.6-9.4 22.6l-64 64z"/></svg></button>
  <button id="prevBtn" title="Previous"><svg viewBox="0 0 320 512"><path d="M267.5 440.6c9.5 7.9 22.8 9.7 34.1 4.4s18.4-16.6 18.4-29l0-320c0-12.4-7.2-23.7-18.4-29s-24.5-3.6-34.1 4.4l-192 160L64 241 64 96c0-17.7-14.3-32-32-32S0 78.3 0 96L0 416c0 17.7 14.3 32 32 32s32-14.3 32-32l0-145 11.5 9.6 192 160z"/></svg></button>
  <button class="play-btn" id="playBtn" title="Play"><svg viewBox="0 0 384 512"><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg></button>
  <button id="nextBtn" title="Next"><svg viewBox="0 0 320 512"><path d="M52.5 440.6c-9.5 7.9-22.8 9.7-34.1 4.4S0 428.4 0 416L0 96C0 83.6 7.2 72.3 18.4 67s24.5-3.6 34.1 4.4l192 160L256 241l0-145c0-17.7 14.3-32 32-32s32 14.3 32 32l0 320c0 17.7-14.3 32-32 32s-32-14.3-32-32l0-145-11.5 9.6-192 160z"/></svg></button>
  <button id="loopBtn" title="Loop"><svg viewBox="0 0 512 512"><path d="M0 224c0 17.7 14.3 32 32 32s32-14.3 32-32c0-53 43-96 96-96l160 0 0 32c0 12.9 7.8 24.6 19.8 29.6s25.7 2.2 34.9-6.9l64-64c12.5-12.5 12.5-32.8 0-45.3l-64-64c-9.2-9.2-22.9-11.9-34.9-6.9S320 19.1 320 32l0 32L160 64C71.6 64 0 135.6 0 224zm512 64c0-17.7-14.3-32-32-32s-32 14.3-32 32c0 53-43 96-96 96l-160 0 0-32c0-12.9-7.8-24.6-19.8-29.6s-25.7-2.2-34.9 6.9l-64 64c-12.5 12.5-12.5 32.8 0 45.3l64 64c9.2 9.2 22.9 11.9 34.9 6.9s19.8-16.6 19.8-29.6l0-32 160 0c88.4 0 160-71.6 160-160z"/></svg></button>
</div>

<div class="tracklist-wrap" id="tracklist">
  <div class="loading">Loading tracks...</div>
</div>

<div style="padding:8px 20px;flex-shrink:0;">
  <p style="font-size:9px;color:#444;line-height:1.6;letter-spacing:0.5px;">
    These recordings are in the public domain. Download and use them all you want, but please consider giving credit to WHTC for the mastering.
  </p>
</div>

<div class="footer" style="flex-shrink:0;padding:12px 20px;margin-top:0;">
  <a class="footer-link" href="https://www.youtube.com/channel/UCVP7UpPw6Rr_nJFBlFYDG7w" target="_blank">
    <img src="/static/whtc_rect.jpeg" alt="WHTC">
    <span>The Witching Hour Tone Club on YouTube</span>
  </a>
</div>

<script>
let tracks = [];
const audio = new Audio();
let currentIndex = 0;
let isPlaying = false;
let isShuffled = false;
let isLooping = false;
let playOrder = [];

const titleText = document.getElementById('titleText');
const loadingTextEl = document.getElementById('loadingText');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const loopBtn = document.getElementById('loopBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const elapsed = document.getElementById('elapsed');
const remaining = document.getElementById('remaining');
const tracklist = document.getElementById('tracklist');

const playSVG = '<svg viewBox="0 0 384 512"><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg>';
const pauseSVG = '<svg viewBox="0 0 320 512"><path d="M48 64C21.5 64 0 85.5 0 112L0 400c0 26.5 21.5 48 48 48l32 0c26.5 0 48-21.5 48-48l0-288c0-26.5-21.5-48-48-48L48 64zm192 0c-26.5 0-48 21.5-48 48l0 288c0 26.5 21.5 48 48 48l32 0c26.5 0 48-21.5 48-48l0-288c0-26.5-21.5-48-48-48l-32 0z"/></svg>';

let loadingTimer = null;
let loadingReady = false;

function startLoadingAnim() {
  clearTimeout(loadingTimer);
  loadingTextEl.textContent = '';
  loadingTextEl.classList.remove('scroll-off');
  loadingReady = false;

  const letters = 'LOADING'.split('');
  let i = 0;

  function typeLetter() {
    if (i < letters.length) {
      loadingTextEl.textContent += letters[i];
      i++;
      loadingTimer = setTimeout(typeLetter, 150);
    } else {
      if (loadingReady) dismissLoading();
    }
  }
  typeLetter();
}

function dismissLoading() {
  loadingTextEl.classList.add('scroll-off');
  setTimeout(() => {
    loadingTextEl.textContent = '';
    loadingTextEl.classList.remove('scroll-off');
  }, 350);
}

function onAudioReady() {
  loadingReady = true;
  if (loadingTextEl.textContent === 'LOADING') {
    dismissLoading();
  }
}

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

async function loadTracks() {
  try {
    const resp = await fetch('/api/tracks');
    tracks = await resp.json();
    playOrder = tracks.map((_, i) => i);
    renderTracklist();
  } catch (e) {
    tracklist.innerHTML = '<div class="loading">Could not load tracks</div>';
  }
}

function renderTracklist() {
  tracklist.innerHTML = '';
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track' + (i === currentIndex ? ' active' : '');
    const plays = t.play_count || 0;
    div.innerHTML = `
      <span class="num">${i + 1}</span>
      <div class="info"><div class="title">${t.title}</div></div>
      <span class="plays">${plays > 0 ? plays + '\u00D7' : ''}</span>
      <span class="dur">${fmt(t.dur)}</span>
    `;
    div.onclick = () => { currentIndex = i; renderTracklist(); scrollToActive(); };
    div.ondblclick = () => { currentIndex = i; loadAndPlay(); };
    tracklist.appendChild(div);
  });
}

function scrollToActive() {
  const el = tracklist.querySelector('.track.active');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function loadAndPlay() {
  const t = tracks[currentIndex];
  titleText.textContent = t.title;
  progressFill.style.width = '0%';
  elapsed.textContent = '0:00';
  remaining.textContent = '-' + fmt(t.dur);
  startLoadingAnim();
  audio.src = '/' + t.src;
  audio.play();
  isPlaying = true;
  playBtn.innerHTML = pauseSVG;
  document.getElementById('nowPlayCount').textContent = (t.play_count || 0) + ' plays';
  // Increment play count
  t.play_count = (t.play_count || 0) + 1;
  fetch('/api/track-played', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id: t.id}) }).catch(() => {});
  renderTracklist();
  scrollToActive();
}

function getNextIndex() {
  const pos = playOrder.indexOf(currentIndex);
  if (pos < playOrder.length - 1) return playOrder[pos + 1];
  if (isLooping) return playOrder[0];
  return -1;
}

function getPrevIndex() {
  const pos = playOrder.indexOf(currentIndex);
  if (pos > 0) return playOrder[pos - 1];
  if (isLooping) return playOrder[playOrder.length - 1];
  return -1;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

playBtn.onclick = () => {
  if (!audio.src || audio.src === location.href) { loadAndPlay(); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; playBtn.innerHTML = playSVG; }
  else { audio.play(); isPlaying = true; playBtn.innerHTML = pauseSVG; }
};

nextBtn.onclick = () => {
  const next = getNextIndex();
  if (next >= 0) { currentIndex = next; loadAndPlay(); }
};

prevBtn.onclick = () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const prev = getPrevIndex();
  if (prev >= 0) { currentIndex = prev; loadAndPlay(); }
};

shuffleBtn.onclick = () => {
  isShuffled = !isShuffled;
  shuffleBtn.classList.toggle('active', isShuffled);
  if (isShuffled) {
    playOrder = shuffle(tracks.map((_, i) => i));
    const pos = playOrder.indexOf(currentIndex);
    if (pos > 0) { playOrder.splice(pos, 1); playOrder.unshift(currentIndex); }
  } else {
    playOrder = tracks.map((_, i) => i);
  }
};

loopBtn.onclick = () => {
  isLooping = !isLooping;
  loopBtn.classList.toggle('active', isLooping);
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    elapsed.textContent = fmt(audio.currentTime);
    remaining.textContent = '-' + fmt(audio.duration - audio.currentTime);
  }
};

audio.oncanplay = () => onAudioReady();

audio.onended = () => {
  const next = getNextIndex();
  if (next >= 0) { currentIndex = next; loadAndPlay(); }
  else { isPlaying = false; playBtn.innerHTML = playSVG; }
};

progressBar.onclick = (e) => {
  if (audio.duration) {
    const rect = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  }
};

loadTracks();

// Record page hit
fetch('/api/hit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: '/'}) }).catch(() => {});

// Track YouTube clicks
document.querySelectorAll('a[href*="youtube.com"]').forEach(a => {
  a.addEventListener('click', () => {
    fetch('/api/hit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: '/youtube'}) }).catch(() => {});
  });
});
</script>
</body>
</html>
